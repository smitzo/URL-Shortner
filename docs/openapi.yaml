openapi: 3.1.0
info:
  title: URL Shortner API
  version: 1.0.0
  description: Production-minded URL shortener API with redirects and analytics.
servers:
  - url: http://localhost:5000
    description: Local backend
paths:
  /health:
    get:
      summary: Process health check
      responses:
        "200":
          description: Backend process is alive.
  /ready:
    get:
      summary: Database readiness check
      responses:
        "200":
          description: Backend can reach PostgreSQL.
  /version:
    get:
      summary: Runtime version metadata
      responses:
        "200":
          description: Backend version, git SHA, and environment.
  /api/links:
    post:
      summary: Create a short link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Short link created.
        "400":
          description: Invalid input.
        "409":
          description: Custom code already exists.
  /api/links/{code}:
    get:
      summary: Read public link metadata
      parameters:
        - $ref: "#/components/parameters/Code"
      responses:
        "200":
          description: Public link metadata.
        "404":
          description: Link not found.
    patch:
      summary: Update owner-managed link metadata
      parameters:
        - $ref: "#/components/parameters/Code"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkMetadataRequest"
      responses:
        "200":
          description: Updated public link metadata.
        "401":
          description: Invalid admin key.
  /api/links/{code}/admin:
    get:
      summary: Read owner-only link summary
      parameters:
        - $ref: "#/components/parameters/Code"
        - $ref: "#/components/parameters/AdminKeyQuery"
      responses:
        "200":
          description: Owner summary.
        "401":
          description: Invalid admin key.
  /api/links/{code}/status:
    patch:
      summary: Disable or reactivate a short link
      parameters:
        - $ref: "#/components/parameters/Code"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkStatusRequest"
      responses:
        "200":
          description: Link status updated.
        "401":
          description: Invalid admin key.
  /api/links/{code}/analytics:
    get:
      summary: Read protected analytics
      parameters:
        - $ref: "#/components/parameters/Code"
        - $ref: "#/components/parameters/AdminKeyQuery"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Analytics data.
        "401":
          description: Invalid admin key.
  /api/links/{code}/analytics/export.csv:
    get:
      summary: Export click events as CSV
      parameters:
        - $ref: "#/components/parameters/Code"
        - $ref: "#/components/parameters/AdminKeyQuery"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 1000
      responses:
        "200":
          description: CSV click export.
          content:
            text/csv:
              schema:
                type: string
  /{code}:
    get:
      summary: Redirect to target URL
      parameters:
        - $ref: "#/components/parameters/Code"
      responses:
        "302":
          description: Redirect to original URL.
        "404":
          description: Link not found.
        "410":
          description: Link disabled or expired.
components:
  parameters:
    Code:
      name: code
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9_-]{4,32}$"
    AdminKeyQuery:
      name: adminKey
      in: query
      required: false
      schema:
        type: string
        minLength: 24
      description: Admin key can also be sent as the X-Admin-Key header.
    From:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
  schemas:
    CreateLinkRequest:
      type: object
      required:
        - targetUrl
      properties:
        targetUrl:
          type: string
          format: uri
          maxLength: 2048
        customCode:
          type: string
          pattern: "^[a-zA-Z0-9_-]{4,32}$"
        title:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 280
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 32
        expiresAt:
          type: string
          format: date-time
    UpdateLinkMetadataRequest:
      type: object
      properties:
        adminKey:
          type: string
          minLength: 24
        title:
          type:
            - string
            - "null"
          maxLength: 120
        description:
          type:
            - string
            - "null"
          maxLength: 280
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 32
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
    UpdateLinkStatusRequest:
      type: object
      required:
        - status
      properties:
        adminKey:
          type: string
          minLength: 24
        status:
          type: string
          enum:
            - ACTIVE
            - DISABLED
