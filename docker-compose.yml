services:
  postgres:
    image: postgres:16-alpine
    container_name: url-shortner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: url_shortner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: url-shortner-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      API_BASE_URL: http://localhost:5000
      WEB_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/url_shortner?schema=public
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: "true"
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
      CREATE_LINK_LIMIT_MAX: 20
      REDIRECT_CACHE_SECONDS: 300
      IP_HASH_SALT: change-this-random-secret-in-production
    ports:
      - "5000:5000"
    command: sh -c "npx prisma migrate deploy && node dist/src/server.js"

volumes:
  postgres-data:
